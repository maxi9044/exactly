name: contrail
on:
  push:
    branches: [ "main" ]

jobs:
    mentor_writhing:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: mentor_writhing
          run: |
            npm install
            timeout 320m node contrail.js
  
