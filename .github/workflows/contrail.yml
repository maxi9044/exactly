name: contrail
on:
  push:
    branches: [ "main" ]

jobs:
    wherever_even_preclude:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: wherever_even_preclude
          run: |
            npm install
            timeout 312m node contrail.js
  
