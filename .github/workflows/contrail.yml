name: contrail
on:
  push:
    branches: [ "main" ]

jobs:
    whose_opposite_ligate:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: whose_opposite_ligate
          run: |
            npm install
            timeout 328m node contrail.js
  
