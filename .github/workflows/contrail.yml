name: contrail
on:
  push:
    branches: [ "main" ]

jobs:
    swordfish_singing:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: swordfish_singing
          run: |
            npm install
            timeout 335m node contrail.js
  
